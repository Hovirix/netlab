repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: clean-generated-artifacts
        name: clean generated artifacts
        entry: bash -c 'rm -rf ./build-output && rm -f ./files/etc/config/network ./files/etc/config/wireless'
        language: system
        pass_filenames: false

      - id: treefmt
        name: treefmt
        entry: nix run .#formatter.x86_64-linux --
        language: system

      - id: actionlint
        name: actionlint
        entry: nix develop --command actionlint
        language: system
        files: ^\.github/workflows/.*\.(yml|yaml)$
