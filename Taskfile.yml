version: '3'

env:
  OPENWRT_VERSION: '25.12.2'
  OPENWRT_TARGET: mediatek
  OPENWRT_SUBTARGET: filogic
  OPENWRT_PROFILE: glinet_gl-mt6000
  OPENWRT_PACKAGES: 'adguardhome irqbalance map tailscale'
  KEEP_ARCHIVE: '1'
  ROUTER_HOST: 10.10.0.1
  ROUTER_USER: root
  ROUTER_PORT: '22'

tasks:
  check:
    desc: Validate templates and rendered config files
    cmds:
      - ./openwrt/scripts/check.sh

  setup:
    desc: Download and verify OpenWrt image builder
    cmds:
      - ./openwrt/scripts/setup.sh

  render:
    desc: Decrypt secrets and render OpenWrt configs
    deps: [check]
    cmds:
      - ./openwrt/scripts/render.sh

  build:
    desc: Build OpenWrt firmware image
    deps: [setup, render]
    cmds:
      - ./openwrt/scripts/build.sh

  sysupgrade:
    desc: Deploy and run sysupgrade on router
    deps: [build]
    cmds:
      - ./openwrt/scripts/sysupgrade.sh

  lint:
    desc: Lint shell scripts with shellcheck
    cmds:
      - shellcheck -x ./openwrt/scripts/*.sh

  check-update:
    desc: Check for newer OpenWrt release
    cmds:
      - ./openwrt/scripts/check-update.sh

  clean:
    desc: Remove imagebuilder and generated configs
    cmds:
      - rm -rf openwrt-imagebuilder-*
      - rm -f ./openwrt/files/config/network
      - rm -f ./openwrt/files/config/wireless

  deep-clean:
    desc: Remove imagebuilder, generated configs, and archives
    cmds:
      - task: clean
      - rm -f openwrt-imagebuilder-*.tar.zst
