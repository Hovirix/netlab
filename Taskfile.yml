version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Format repository files
    cmds:
      - nix fmt

  lint:
    desc: Run repository linters
    cmds:
      - actionlint
      - deadnix --fail .
      - statix check .
      - typos --exclude secrets.sops.yaml --exclude 'secrets/*.sops.yaml'

  check:
    desc: Run repository checks
    cmds:
      - task lint

  clean:
    desc: Remove generated build files
    cmds:
      - rm -rf build build-output
