version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Format repository files
    cmds:
      - nix fmt

  check:
    desc: Run repository checks
    cmds:
      - nix flake check

  clean:
    desc: Remove generated build files
    cmds:
      - rm -rf build build-output
