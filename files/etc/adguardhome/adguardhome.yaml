http:
  address: 10.10.0.1:3000

dns:
  # General settings
  bind_hosts:
    - 0.0.0.0
  port: 53

  # Upstream DNS servers settings:
  upstream_dns:
    - https://dns11.quad9.net/dns-query
    - https://family.dns.mullvad.net/dns-query
  bootstrap_dns:
    - 9.9.9.11
    - 149.112.112.11
    - 2620:fe::11
    - 2620:fe::fe:11
  upstream_mode: parallel
  use_http3_upstreams: true

  # DNS cache settings
  cache_enabled: true
  cache_size: 4194304
  cache_optimistic: true

  # Other settings
  enable_dnssec: true
  serve_http3: true

filtering:
  protection_enabled: true
  filtering_enabled: true

  blocking_mode: refused

  rewrites:
    - domain: "*.home.hovirix.dev"
      answer: 10.20.0.10
      enabled: true

    - domain: "compute-01.home.hovirix.dev"
      answer: 10.10.0.11
      enabled: true

    - domain: "infra-01.home.hovirix.dev"
      answer: 10.10.0.10
      enabled: true

    - domain: "prod-apps-01.home.hovirix.dev"
      answer: 10.20.0.100
      enabled: true

    - domain: "prod-data-01.home.hovirix.dev"
      answer: 10.20.0.50
      enabled: true

    - domain: "prod-edge-01.home.hovirix.dev"
      answer: 10.20.0.10
      enabled: true

    - domain: "prod-idp-01.home.hovirix.dev"
      answer: 10.20.0.11
      enabled: true

    - domain: "prod-monitoring-01.home.hovirix.dev"
      answer: 10.10.0.50
      enabled: true

    - domain: "authentik.internal.home.hovirix.dev"
      answer: 10.20.0.11
      enabled: true

    - domain: "grafana.internal.home.hovirix.dev"
      answer: 10.10.0.50
      enabled: true

    - domain: "immich.internal.home.hovirix.dev"
      answer: 10.20.0.100
      enabled: true

    - domain: "paperless.internal.home.hovirix.dev"
      answer: 10.20.0.100
      enabled: true

    - domain: "postgres.internal.home.hovirix.dev"
      answer: 10.20.0.50
      enabled: true

    - domain: "valkey.internal.home.hovirix.dev"
      answer: 10.20.0.50
      enabled: true

    - domain: "vaultwarden.internal.home.hovirix.dev"
      answer: 10.20.0.100
      enabled: true

querylog:
  enabled: true
  file_enabled: true
  interval: 2160h
  size_memory: 1000

statistics:
  enabled: true
  interval: 24h

filters:
  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/tif.txt
    name: HaGeZi's Threat Intelligence Feeds DNS Blocklist
    id: 1770480370
  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/spam-tlds.txt
    name: HaGeZi's The World's Most Abused TLDs
    id: 1770480371
  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/ultimate.txt
    name: HaGeZi's Ultimate DNS Blocklist
    id: 1770480372
  - enabled: true
    url: https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/adguard/dns-rebind-protection.txt
    name: HaGeZi's DNS Rebind Protection
    id: 1770480373

schema_version: 32
