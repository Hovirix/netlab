defaults:
  input: REJECT
  output: ACCEPT
  forward: REJECT
  synflood_protect: 1
  flow_offloading: 1
  flow_offloading_hw: 1

zones:
  - name: wan
    input: DROP
    output: ACCEPT
    forward: DROP
    networks:
      - wan6
      - wan
    masq: 1
    mtu_fix: 1
  - name: vlan10
    input: DROP
    output: ACCEPT
    forward: REJECT
    networks:
      - vlan10
  - name: vlan20
    input: DROP
    output: ACCEPT
    forward: REJECT
    networks:
      - vlan20
  - name: vlan30
    input: DROP
    output: ACCEPT
    forward: REJECT
    networks:
      - vlan30
  - name: vlan40
    input: DROP
    output: ACCEPT
    forward: REJECT
    networks:
      - vlan40
  - name: vlan50
    input: DROP
    output: ACCEPT
    forward: REJECT
    networks:
      - vlan50
  - name: vlan60
    input: DROP
    output: ACCEPT
    forward: REJECT
    networks:
      - vlan60
  - name: vpn
    input: DROP
    output: ACCEPT
    forward: REJECT
    networks:
      - vpn

forwardings:
  - src: vlan10
    dest: wan
  - src: vlan20
    dest: wan
  - src: vlan30
    dest: wan
  - src: vlan40
    dest: wan
  - src: vlan50
    dest: wan
  - src: vpn
    dest: wan

rules:
  - name: Allow-WAN-to-Router-WireGuard
    src: wan
    proto: udp
    dest_port: 51820
    target: ACCEPT
  - name: Allow-VLAN10-to-Router-HTTPS
    src: vlan10
    proto: tcp
    dest_port: 443
    target: ACCEPT
  - name: Allow-VLAN10-to-Router-AdGuard-UI
    src: vlan10
    proto: tcp
    dest_port: 3000
    target: ACCEPT
  - name: Allow-VLAN10-to-Router-SSH
    src: vlan10
    proto: tcp
    dest_port: 22
    target: ACCEPT
  - name: Allow-VLAN10-to-Router-DNS-TCP
    src: vlan10
    proto: tcp
    dest_port: 53
    target: ACCEPT
  - name: Allow-VLAN10-to-Router-DNS-UDP
    src: vlan10
    proto: udp
    dest_port: 53
    target: ACCEPT
  - name: Allow-VLAN10-to-Router-DHCP
    src: vlan10
    proto: udp
    src_port: 68
    dest_port: 67
    target: ACCEPT
  - name: Allow-VLAN20-to-Router-DNS-TCP
    src: vlan20
    proto: tcp
    dest_port: 53
    target: ACCEPT
  - name: Allow-VLAN20-to-Router-DNS-UDP
    src: vlan20
    proto: udp
    dest_port: 53
    target: ACCEPT
  - name: Allow-VLAN30-to-Router-DNS-TCP
    src: vlan30
