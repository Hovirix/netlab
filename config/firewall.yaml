    proto: udp
    src_port: 68
    dest_port: 67
    target: ACCEPT
  - name: Allow-VLAN50-to-Router-DNS-TCP
    src: vlan50
    proto: tcp
    dest_port: 53
    target: ACCEPT
  - name: Allow-VLAN50-to-Router-DNS-UDP
    src: vlan50
    proto: udp
    dest_port: 53
    target: ACCEPT
  - name: Allow-VLAN50-to-Router-DHCP
    src: vlan50
    proto: udp
    src_port: 68
    dest_port: 67
    target: ACCEPT
  - name: Allow-VLAN60-to-Router-DNS-TCP
    src: vlan60
    proto: tcp
    dest_port: 53
    target: ACCEPT
  - name: Allow-VLAN60-to-Router-DNS-UDP
    src: vlan60
