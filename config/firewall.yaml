    dest_port: 53
    target: ACCEPT
  - name: Allow-VLAN30-to-Router-DHCP
    src: vlan30
    proto: udp
    src_port: 68
    dest_port: 67
    target: ACCEPT
  - name: Allow-VLAN40-to-Router-DNS-TCP
    src: vlan40
    proto: tcp
    dest_port: 53
    target: ACCEPT
  - name: Allow-VLAN40-to-Router-DNS-UDP
    src: vlan40
    proto: udp
    dest_port: 53
