    dest_port: 22
    target: ACCEPT
  - name: Allow-VPN-to-Router-AdGuard-UI
    src: vpn
    proto: tcp
    dest_port: 3000
    target: ACCEPT
  - name: Allow-VPN-to-Router-DNS-TCP
    src: vpn
    proto: tcp
    dest_port: 53
    target: ACCEPT
  - name: Allow-VPN-to-Router-DNS-UDP
    src: vpn
    proto: udp
    dest_port: 53
    target: ACCEPT
  - name: Allow-VLAN10-to-VLAN20-Proxmox-HTTPS
    src: vlan10
    dest: vlan20
    proto: tcp
    dest_port: 8006
    target: ACCEPT
  - name: Allow-VLAN10-to-VLAN20-SSH
    src: vlan10
    dest: vlan20
    proto: tcp
    dest_port: 22
    target: ACCEPT
  - name: Allow-VLAN10-to-VLAN30-TrueNAS-HTTPS
    src: vlan10
    dest: vlan30
    proto: tcp
    dest_port: 443
    target: ACCEPT
  - name: Allow-VLAN10-to-VLAN30-TrueNAS-SSH
    src: vlan10
    dest: vlan30
    proto: tcp
    dest_port: 22
    target: ACCEPT
  - name: Allow-VLAN10-to-VLAN40-TalosAPI
    src: vlan10
    dest: vlan40
    proto: tcp
    dest_port: 50000
    target: ACCEPT
  - name: Allow-VLAN10-to-VLAN40-KubeAPI
    src: vlan10
    dest: vlan40
    proto: tcp
    dest_port: 6443
    target: ACCEPT
