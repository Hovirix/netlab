    src: vpn
    dest: vlan20
    proto: tcp
    dest_port: 8006
    target: ACCEPT
  - name: Allow-VPN-to-VLAN20-SSH
    src: vpn
    dest: vlan20
    proto: tcp
    dest_port: 22
    target: ACCEPT
  - name: Allow-VPN-to-VLAN30-TrueNAS-HTTPS
    src: vpn
    dest: vlan30
    proto: tcp
    dest_port: 443
    target: ACCEPT
  - name: Allow-VPN-to-VLAN30-TrueNAS-SSH
    src: vpn
    dest: vlan30
    proto: tcp
    dest_port: 22
    target: ACCEPT
  - name: Allow-VPN-to-VLAN40-TalosAPI
    src: vpn
    dest: vlan40
    proto: tcp
    dest_port: 50000
    target: ACCEPT
  - name: Allow-VPN-to-VLAN40-KubeAPI
    src: vpn
    dest: vlan40
    proto: tcp
    dest_port: 6443
    target: ACCEPT
  - name: Allow-VLAN20-to-VLAN30-NFSv4
    src: vlan20
    dest: vlan30
    proto: tcp
    dest_port: 2049
    target: ACCEPT
  - name: Allow-VLAN40-to-VLAN30-NFSv4
    src: vlan40
    dest: vlan30
    proto: tcp
    dest_port: 2049
    target: ACCEPT
  - name: Allow-WAN-to-Router-DHCPv6
    src: wan
    proto: udp
    src_port: 547
    dest_port: 546
    family: ipv6
    target: ACCEPT
  - name: Allow-WAN-to-Router-ICMPv6
    src: wan
    proto: icmp
    icmp_types:
      - echo-request
      - echo-reply
      - destination-unreachable
      - packet-too-big
      - time-exceeded
      - bad-header
      - unknown-header-type
      - router-solicitation
      - neighbour-solicitation
      - router-advertisement
      - neighbour-advertisement
    limit: 1000/sec
    family: ipv6
    target: ACCEPT
  - name: Allow-WAN-to-Any-ICMPv6
    src: wan
    dest: '*'
    proto: icmp
    icmp_types:
      - echo-request
      - echo-reply
      - destination-unreachable
      - packet-too-big
      - time-exceeded
      - bad-header
      - unknown-header-type
    limit: 1000/sec
    family: ipv6
    target: ACCEPT
