name: OpenWrt Update

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v19

      - name: Check for new OpenWrt release
        id: check
        shell: bash
        run: |
          output="$(nix run .#check-update 2>&1)"

          printf '%s\n' "$output"

          latest="$(printf '%s\n' "$output" | sed -n 's/^LATEST_OPENWRT_VERSION=//p' | tail -n 1)"
          current="$(printf '%s\n' "$output" | sed -n 's/^CURRENT_OPENWRT_VERSION=//p' | tail -n 1)"
          has_update="$(printf '%s\n' "$output" | sed -n 's/^OPENWRT_UPDATE_AVAILABLE=//p' | tail -n 1)"
          imagebuilder_hash="$(printf '%s\n' "$output" | sed -n 's/^IMAGEBUILDER_HASH=//p' | tail -n 1)"

          if [ -z "$has_update" ]; then
            has_update=false
          fi

          {
            echo "latest=$latest"
            echo "current=$current"
            echo "has_update=$has_update"
            echo "imagebuilder_hash=$imagebuilder_hash"
          } >> "$GITHUB_OUTPUT"

      - name: Stop when already up to date
        if: steps.check.outputs.has_update != 'true'
        run: echo "No OpenWrt update available"

      - name: Bump version and imagebuilder hash in config
        if: steps.check.outputs.has_update == 'true'
        run: |
          sed -i "s/^ *openwrtVersion = \".*\";/  openwrtVersion = \"${{ steps.check.outputs.latest }}\";/" config.nix
          sed -i "s|^ *imageBuilderHash = \".*\";|  imageBuilderHash = \"${{ steps.check.outputs.imagebuilder_hash }}\";|" config.nix

      - name: Create or update PR
        if: steps.check.outputs.has_update == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: bump OpenWrt to ${{ steps.check.outputs.latest }}"
          branch: "ci/openwrt-update-${{ steps.check.outputs.latest }}"
          delete-branch: true
          title: "chore: bump OpenWrt to ${{ steps.check.outputs.latest }}"
          body: |
            Automated OpenWrt version update.

            - Current: `${{ steps.check.outputs.current }}`
            - Latest: `${{ steps.check.outputs.latest }}`
            - Updated files: `config.nix`

            Please review and merge.

      - name: Create issue for review
        if: steps.check.outputs.has_update == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const latest = `${{ steps.check.outputs.latest }}`;
            const prUrl = `${{ steps.cpr.outputs.pull-request-url }}`;
            const title = `OpenWrt update available: ${latest}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const exists = openIssues.find((issue) => issue.title === title);
            if (exists) {
              core.info(`Issue already exists: #${exists.number}`);
              return;
            }

            const body = [
              'An automated OpenWrt update PR was created and is ready for review.',
              '',
              `- Current: ${{ steps.check.outputs.current }}`,
              `- Latest: ${latest}`,
              `- PR: ${prUrl}`,
              '',
              'Merge the PR when validation is complete.',
            ].join('\n');

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
