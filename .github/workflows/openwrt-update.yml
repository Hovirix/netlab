name: OpenWrt Update

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install go-task
        uses: arduino/setup-task@v2

      - name: Check for new OpenWrt release
        id: check
        shell: bash
        run: |
          set +e
          output="$(task check-update 2>&1)"
          status=$?
          set -e

          printf '%s\n' "$output"

          latest="$(printf '%s\n' "$output" | sed -n 's/^LATEST_OPENWRT_VERSION=//p' | tail -n 1)"
          current="$(sed -n "s/^  OPENWRT_VERSION: '\(.*\)'/\1/p" Taskfile.yml | tail -n 1)"

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"

      - name: Stop when already up to date
        if: steps.check.outputs.status == '0'
        run: echo "No OpenWrt update available"

      - name: Bump version in Taskfile
        if: steps.check.outputs.status == '2'
        run: |
          sed -i "s/^  OPENWRT_VERSION: '.*'/  OPENWRT_VERSION: '${{ steps.check.outputs.latest }}'/" Taskfile.yml

      - name: Create or update PR
        if: steps.check.outputs.status == '2'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump OpenWrt to ${{ steps.check.outputs.latest }}"
          branch: "ci/openwrt-update-${{ steps.check.outputs.latest }}"
          delete-branch: true
          title: "chore: bump OpenWrt to ${{ steps.check.outputs.latest }}"
          body: |
            Automated OpenWrt version update.

            - Current: `${{ steps.check.outputs.current }}`
            - Latest: `${{ steps.check.outputs.latest }}`
            - Updated file: `Taskfile.yml`

            Please review and merge.

      - name: Create issue for review
        if: steps.check.outputs.status == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const latest = `${{ steps.check.outputs.latest }}`;
            const prUrl = `${{ steps.cpr.outputs.pull-request-url }}`;
            const title = `OpenWrt update available: ${latest}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const exists = openIssues.find((issue) => issue.title === title);
            if (exists) {
              core.info(`Issue already exists: #${exists.number}`);
              return;
            }

            const body = [
              'An automated OpenWrt update PR was created and is ready for review.',
              '',
              `- Current: ${{ steps.check.outputs.current }}`,
              `- Latest: ${latest}`,
              `- PR: ${prUrl}`,
              '',
              'Merge the PR when validation is complete.',
            ].join('\n');

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
